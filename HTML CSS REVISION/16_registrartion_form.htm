<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    fieldset#f1{
        /* width: 90%; */
        background-color: rgb(212, 215, 216);
        /* border: 2px solid rgb(0, 0, 0); */
        
    }
    h1{
        /* width: 97%; */
        text-align: center;
        font-family: Arial, Helvetica, sans-serif;
        border: 2px solid rgb(0, 0, 0);
        background-color: red;
        color: rgb(0, 0, 0);
    }

    legend{
        font-size: 20px;
        font-weight: bold;
        font-family: Arial, Helvetica, sans-serif;
        color: red;
    }
    input[type="submit"]
    {
        background-color: rgb(227, 248, 35);
        color: rgb(2, 18, 107);
        font-size: 20px;
        font-weight: bold;
        font-family: Arial, Helvetica, sans-serif;
        /* border: none; */
        padding: 10px 20px;
        cursor: pointer;
        border: 2px solid rgb(2, 18, 107);
        border-radius: 30px;
    }
    input[type="reset"]
    {
        background-color: rgb(227, 248, 35);
        color: rgb(2, 18, 107);
        font-size: 20px;
        font-weight: bold;
        font-family: Arial, Helvetica, sans-serif;
        /* border: none; */
        padding: 10px 20px;
        cursor: pointer;
        border: 2px solid rgb(2, 18, 107);
        border-radius: 30px;
    }
    </style>
</head>
<body>
    <h1>Registrtion Page</h1>
    <fieldset id="f1">
        <fieldset>
            <legend>Personal Information</legend>
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" placeholder="abcd@1234"><br><br>
                <label for="password" >Password:</label>
                <input type="password" id="password" name="password" placeholder="alphanumeric like abc1234"><br><br>
                <label for="re_password">Re-enter Password:</label>
                <input type="password" id="re_password" name="re_password"><br><br>
            
                <label for="first_name">First Name:</label>
                <input type="text" id="first_name" name="first_name"><br><br>
                <label for="middle_name">Middle Name:</label>
                <input type="text" id="middle_name" name="middle_name"><br><br>
                <label for="last_name">Last Name:</label>
                <input type="text" id="last_name" name="last_name"><br><br>
        </fieldset>
            
            <fieldset>
                <legend>Contact Information</legend>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email"><br><br>
                <label for="phone">Phone:</label>
                <input type="tel" id="phone" name="phone"><br><br>
            </fieldset>

            <fieldset>
                <legend>Gender:</legend>
                <input type="radio" id="male" name="gender" value="male">
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female">
                <label for="female">Female</label>
                <input type="radio" id="other" name="gender" value="other">
                <label for="other">Other</label>
            </fieldset>
            <br>
            <input type="submit" value="Register">
            <input type="reset" value="Reset">
    </fieldset>
</body>
</html>
