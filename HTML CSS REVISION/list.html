<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>List</h1>

    <!--type: cirlcle,disk (default) -->

    <ul type="square"> 
        <li>Coffee</li>
        <li>Cold Drink</li>
        <li>Water</li>
        <li>Shakes</li>
    </ul>

    <!-- type: no. roman , alphabet -->
    <ol type="1" start="4">
        <li>BBA</li>
        <li>BCA</li>
        <li>BA</li>
        <li value="12">B.TECH</li>
        <li>B.Com</li>
        <li>B.Pharma</li>
    </ol>

    <dl>
        <!-- defination term -->
        <dt>computer</dt>
        <!-- defination data -->
        <dd>computer is an electronic device</dd>

        <dt>Mouse</dt>
        <dd>Mouse is an electronic input device</dd>

        <dt>Printer</dt>
        <dd>Printer is an electronic output device</dd>
    </dl>

</body>
</html>
