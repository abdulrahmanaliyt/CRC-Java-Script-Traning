<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <!-- Take input from user to print table of that number -->
    <h1 style="text-align: center;">Table Generator App</h1>
    <hr>
    <div>
        <input type="number" name="number" id="txt1"> 
        
        <button onclick="
        let num= Number(txt1.value);
        for(let i=1; i<=10; i++){
            res.innerHTML+=(`<br>${num} x ${i} = ${num*i}`);
        }
        ">Generate Table</button>
        <div id="res"></div>
</body>
</html>
